<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Código da Mensagem Magnética</title>
<style>
  :root{
    --primary:#cf3a7d; --primary-d:#a52b62; --accent:#2cbf52; --accent-d:#1f9b40;
    --bg:#f0f2f7; --ink:#1a1a2e; --muted:#6b7280; --line:#e8ecf0; --card:#fff;
    --danger:#ef4444; --warn:#f5a623; --ok:#16a34a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:#cfd6e0;border-radius:99px}

  /* ===== LOGIN GATE ===== */
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--primary) 0%,#2563eb 100%);z-index:1000;padding:20px}
  .gate-card{background:#fff;width:360px;max-width:100%;border-radius:20px;padding:34px 28px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .gate-logo{font-size:42px;margin-bottom:10px}
  .gate-card h1{font-size:20px;margin-bottom:4px}
  .gate-card p{font-size:13px;color:var(--muted);margin-bottom:22px}
  .gate-card input{width:100%;padding:13px 14px;border:2px solid var(--line);border-radius:12px;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:12px}
  .gate-card input:focus{border-color:var(--primary)}
  .gate-card button{width:100%;padding:13px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;
    background:linear-gradient(135deg,var(--primary),var(--primary-d))}
  .gate-err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px}

  /* ===== TOPBAR ===== */
  #dash{display:none}
  .topbar{position:sticky;top:0;z-index:50;height:60px;background:#fff;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:0 18px}
  .tb-logo{font-size:17px;font-weight:800;white-space:nowrap}
  .tb-logo .p{color:var(--primary)}
  .spacer{flex:1}
  .capi-pill{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:99px;border:1px solid var(--line)}
  .capi-dot{width:9px;height:9px;border-radius:50%;background:#9ca3af;animation:pulse 1.4s infinite}
  .capi-pill.ok{background:#eafaef;color:var(--accent-d);border-color:#bfe6c8}
  .capi-pill.ok .capi-dot{background:var(--accent)}
  .capi-pill.bad{background:#fdecec;color:var(--danger);border-color:#f6c5c5}
  .capi-pill.bad .capi-dot{background:var(--danger)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-txt{font-size:12px;color:var(--muted);white-space:nowrap}
  .period-pill{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:99px;background:#f3eef7;color:var(--primary-d);border:1px solid #ecdcf0;white-space:nowrap}
  .btn-refresh{font-size:13px;font-weight:600;padding:7px 13px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .btn-refresh:hover{border-color:var(--primary);color:var(--primary)}

  .wrap{max-width:1240px;margin:0 auto;padding:18px}

  /* ===== DAY FILTER ===== */
  .dayfilter{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:16px}
  .dayfilter label{font-size:13px;font-weight:600;color:var(--muted)}
  .dayfilter input[type=date]{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;outline:none}
  .dayfilter input[type=date]:focus{border-color:var(--primary)}
  .df-btn{font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .df-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
  .df-info{margin-left:auto;font-size:12.5px;color:var(--muted)}

  /* ===== KPIs ===== */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;transition:transform .15s,box-shadow .15s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.07)}
  .kpi .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px}
  .kpi .num{font-size:26px;font-weight:900;line-height:1}
  .kpi .lbl{font-size:10.5px;font-weight:700;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-top:6px}
  .kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px}

  /* ===== CARD ===== */
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
  .card h2{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card h2 .badge{font-size:11px;font-weight:700;color:var(--primary);background:#fdeef5;border-radius:99px;padding:3px 10px}

  /* ===== FUNNEL MINI ===== */
  .funnel-mini{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding-bottom:8px}
  .fm-step{flex:0 0 auto;min-width:118px;text-align:center}
  .fm-bar-wrap{height:80px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:8px}
  .fm-bar{width:46px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,var(--primary),var(--primary-d));min-height:6px;transition:height .4s}
  .fm-val{font-size:18px;font-weight:800}
  .fm-name{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.2}
  .fm-pct{font-size:11px;font-weight:700;margin-top:3px}
  .fm-pct.up{color:var(--accent-d)} .fm-pct.dn{color:var(--danger)}
  .fm-arrow{flex:0 0 auto;display:flex;align-items:center;color:#cbd2dc;font-size:18px;padding:0 2px;align-self:center}

  /* ===== TABS ===== */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{font-size:13px;font-weight:600;padding:9px 15px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .tab.on{background:#fff;color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:#fff}
  .tab.on .em{filter:none}

  /* ===== TABLE ===== */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:680px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:#f8fafc;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);position:sticky;top:0}
  td.fix,th.fix{position:sticky;left:0;background:#fff;z-index:2}
  th.fix{background:#f8fafc}
  tbody tr:hover td{background:#fafbfd}
  tbody tr:hover td.fix{background:#fafbfd}
  .avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:var(--primary);margin-right:8px;vertical-align:middle}
  .badge-ev{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px}
  .badge-ev.view{background:#eef2ff;color:#4f6bed}
  .badge-ev.answer{background:#eafaef;color:var(--accent-d)}
  .badge-ev.checkout{background:#fdeef5;color:var(--primary)}
  .badge-ev.other{background:#f1f3f6;color:var(--muted)}

  /* bar groups (resumo/tráfego) */
  .barGroup{display:flex;flex-direction:column;gap:9px}
  .bg-row{display:grid;grid-template-columns:130px 1fr 46px;gap:10px;align-items:center;font-size:12.5px}
  .bg-name{color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bg-track{height:9px;background:#eef1f5;border-radius:99px;overflow:hidden}
  .bg-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--accent))}
  .bg-val{font-size:12px;font-weight:700;text-align:right;color:var(--muted)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .mini-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .mini-kpi{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px}
  .mini-kpi .n{font-size:20px;font-weight:800}
  .mini-kpi .l{font-size:11px;color:var(--muted);margin-top:3px}

  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;font-size:12.5px;color:var(--muted)}
  .pager button{padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .row-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .btn-soft{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .btn-soft:hover{border-color:var(--primary);color:var(--primary)}
  .btn-danger{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid #f6c5c5;background:#fff;color:var(--danger)}
  .btn-danger:hover{background:var(--danger);color:#fff}

  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}

  /* toast */
  #toast{position:fixed;bottom:18px;right:18px;background:#1a1a2e;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;opacity:0;transform:translateY(10px);transition:.25s;z-index:200;pointer-events:none}
  #toast.show{opacity:1;transform:translateY(0)}

  .hidden{display:none!important}

  /* ===== RESPONSIVE ===== */
  @media(max-width:880px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .mini-kpis{grid-template-columns:repeat(2,1fr)}
    .sync-txt{display:none}
    .tb-logo{font-size:14px}
    .capi-pill .t{display:none}
  }
  @media(max-width:520px){
    .kpis{grid-template-columns:1fr 1fr}
    .wrap{padding:12px}
    .bg-row{grid-template-columns:96px 1fr 40px}
    .period-pill{display:none}
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">💗</div>
    <h1>Código da Mensagem Magnética</h1>
    <p>Painel administrativo de analytics</p>
    <input type="password" id="pwd" placeholder="Senha de acesso" autocomplete="current-password">
    <button onclick="login()">Entrar</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dash">
  <div class="topbar">
    <div class="tb-logo"><span class="p">💗 Código</span> da Mensagem Magnética</div>
    <div class="spacer"></div>
    <div class="capi-pill" id="capiPill"><span class="capi-dot"></span><span class="t" id="capiTxt">CAPI…</span></div>
    <div class="sync-txt" id="syncTxt">sincronizando…</div>
    <div class="period-pill" id="periodPill">📅 Todos os dias</div>
    <button class="btn-refresh" onclick="sync(true)">↻ Atualizar</button>
  </div>

  <div class="wrap">
    <!-- DAY FILTER -->
    <div class="dayfilter">
      <label>📅 Filtrar por dia:</label>
      <input type="date" id="dayInput" onchange="onDayPick(this.value)">
      <button class="df-btn" onclick="setToday()">Hoje</button>
      <button class="df-btn on" id="btnAll" onclick="setAllDays()">Todos os dias</button>
      <span class="df-info" id="dfInfo"></span>
    </div>

    <!-- KPIs -->
    <div class="kpis" id="kpis"></div>

    <!-- FUNNEL CARD -->
    <div class="card">
      <h2>🫧 Funil de Conversão <span class="badge" id="funnelConv">—</span></h2>
      <div class="funnel-mini" id="funnelMini"></div>
      <div id="areaChart" style="margin-top:14px"></div>
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="funil"><span class="em">📊</span> Funil</button>
      <button class="tab" data-tab="eventos"><span class="em">📋</span> Eventos</button>
      <button class="tab" data-tab="resumo"><span class="em">📈</span> Resumo</button>
      <button class="tab" data-tab="trafego"><span class="em">🎯</span> Tráfego</button>
      <button class="tab" data-tab="vendas"><span class="em">💰</span> Vendas</button>
      <button class="tab" data-tab="capi"><span class="em">⚡</span> Meta CAPI</button>
    </div>

    <div id="tabContent"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ====================== CONFIG ====================== */
const PWD   = 'L3c1U64&5';                 // senha do admin (troque aqui)
const PFX   = 'cmm';
const KEY   = PFX+'_ev';                    // backup local de eventos
const CKEY  = PFX+'_admin_cache';           // cache do painel
const SIDK  = PFX+'_sid';
const DAYK  = PFX+'_dayfilter';
const SESSK = PFX+'_admin_auth';
// Cole aqui a URL /exec do seu Google Apps Script (termina em /exec):
const GAS   = 'COLE_AQUI_A_URL_DO_GAS_/exec';

const QUIZ_TOTAL = 6;        // telas do quiz (step 0..5)
const QUIZ_FINAL_STEP = 5;   // tela de resultado/última pergunta
const QUIZ_MID_STEP   = 3;   // ~50% do quiz
const PRICE = 47.00;         // preço do produto (BRL)
const CURRENCY = 'BRL';

const SHOW_AB = false;       // card de teste A/B
const SHOW_PV_BUTTONS = true;// card "Botões da Página de Vendas"

/* ====================== STATE ====================== */
let _evAll = [], _vendasAll = [], _capiLogAll = [];
let _ev = [], _vendas = [], _capiLog = [];
let dayFilter = null;        // null = todos os dias; senão 'YYYY-MM-DD'
let activeTab = 'funil';
let evPage = 1; const EV_PER = 25;

/* ====================== HELPERS ====================== */
const $  = s => document.querySelector(s);
const fmt = n => (n||0).toLocaleString('pt-BR');
const fmtMoney = n => (n||0).toLocaleString('pt-BR',{style:'currency',currency:CURRENCY});
const pct = (a,b) => b>0 ? Math.round(a/b*100) : 0;
const isTest = s => /^teste/i.test(String(s||''));
const APPROVED = /finaliz|aprovad|paid|pago|approved|confirmed/i;

function toMs(v){
  if(v==null||v==='') return 0;
  if(typeof v==='number') return v<2e10 ? v*1000 : v; // segundos→ms
  const n = Number(v); if(!isNaN(n)) return n<2e10 ? n*1000 : n;
  const d = new Date(v); return isNaN(d)?0:d.getTime();
}
function dayKey(ms){
  if(!ms) return '';
  const d = new Date(ms);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ---- normalização de evento ---- */
function parseQS(url){
  const o={}; if(!url) return o;
  try{ const q=String(url).split('?')[1]||''; q.split('&').forEach(p=>{const[k,v]=p.split('=');if(k)o[decodeURIComponent(k)]=decodeURIComponent((v||'').replace(/\+/g,' '));}); }catch(e){}
  return o;
}
function deviceFrom(ua){
  ua=String(ua||'');
  if(/mobile|iphone|android.*mobile/i.test(ua)) return 'Mobile';
  if(/ipad|tablet/i.test(ua)) return 'Tablet';
  if(ua) return 'Desktop'; return '—';
}
function browserFrom(ua){
  ua=String(ua||'');
  if(/edg/i.test(ua))return'Edge'; if(/chrome|crios/i.test(ua))return'Chrome';
  if(/firefox|fxios/i.test(ua))return'Firefox'; if(/safari/i.test(ua))return'Safari';
  if(/instagram/i.test(ua))return'Instagram'; if(/fban|fbav/i.test(ua))return'Facebook';
  return ua?'Outro':'—';
}
function osFrom(ua){
  ua=String(ua||'');
  if(/iphone|ipad|ios/i.test(ua))return'iOS'; if(/android/i.test(ua))return'Android';
  if(/windows/i.test(ua))return'Windows'; if(/mac os|macintosh/i.test(ua))return'macOS';
  if(/linux/i.test(ua))return'Linux'; return ua?'Outro':'—';
}
function norm(r){
  // aceita chaves PT (planilha) ou já normalizadas
  const g=(...k)=>{for(const x of k){if(r[x]!=null&&r[x]!=='')return r[x];}return '';};
  const url=g('url','URL'); const ua=g('ua','UA','user_agent');
  const qs=parseQS(url);
  return {
    t:toMs(g('data','t','date','timestamp')),
    ev:String(g('evento','ev','event')||'').toLowerCase(),
    s:String(g('session','s','sid')||''),
    step:g('step','etapa'),
    name:g('nome','name'),
    gender:g('genero','gender'),
    ans:g('resposta','ans','answer'),
    ms:Number(g('ms'))||0,
    ref:g('referrer','ref'),
    ua, url,
    event_id:g('event_id','eventId'),
    fbp:g('fbp'), fbc:g('fbc'),
    logo_ab:g('logo_ab','ab'),
    utm_source:qs.utm_source||'', utm_medium:qs.utm_medium||'', utm_campaign:qs.utm_campaign||'',
    utm_content:qs.utm_content||'', utm_adset:qs.utm_adset||'',
    device:deviceFrom(ua), browser:browserFrom(ua), os:osFrom(ua)
  };
}
function normVenda(r){
  const g=(...k)=>{for(const x of k){if(r[x]!=null&&r[x]!=='')return r[x];}return '';};
  return {
    t:toMs(g('data','t')), status:String(g('status')||''), metodo:String(g('metodo','method','pagamento')||''),
    valor:(function(v){if(typeof v==='number')return v;v=String(v).replace(/[^\d.,-]/g,'');if(v.indexOf(',')>-1)v=v.replace(/\./g,'').replace(',','.');return Number(v)||0;})(g('valor','value','amount')),
    nome:g('nome','name'), email:g('email'), telefone:g('telefone','phone'),
    order_id:g('order_id','orderId','id'), raw:g('raw')
  };
}
function normCapi(r){
  const g=(...k)=>{for(const x of k){if(r[x]!=null&&r[x]!=='')return r[x];}return '';};
  return { t:toMs(g('data','t')), ev:g('evento','ev'), event_id:g('event_id'), s:g('s','session'),
    status_code:Number(g('status_code','status'))||0, response:String(g('response','resp')||'') };
}

/* ---- contagem ---- */
function liveEv(){ return _ev.filter(e=>!isTest(e.s)); }
function uSet(pred){ const s=new Set(); liveEv().forEach(e=>{if(pred(e)&&e.s)s.add(e.s);}); return s.size; }
function uViews(step){ return uSet(e=>e.ev==='view'&&String(e.step)===String(step)); }

function metrics(){
  const visitors = uViews(0);
  const leads    = uSet(e=>e.ev==='answer'&&String(e.step)==='1');
  const salesV   = uViews('vendas');
  const checkout = uSet(e=>e.ev==='checkout_click');
  const approved = _vendas.filter(v=>APPROVED.test(v.status));
  const purchases= approved.length;
  const revenue  = approved.reduce((a,v)=>a+(v.valor||PRICE),0);
  const ticket   = purchases>0 ? revenue/purchases : 0;
  return {visitors,leads,salesV,checkout,purchases,revenue,ticket};
}

/* ====================== AUTH ====================== */
if(sessionStorage.getItem(SESSK)==='1'){ openDash(); }
$('#pwd').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
function login(){
  if($('#pwd').value===PWD){ sessionStorage.setItem(SESSK,'1'); openDash(); }
  else { $('#gateErr').textContent='Senha incorreta. Tente novamente.'; }
}
function openDash(){
  $('#gate').classList.add('hidden'); $('#dash').style.display='block';
  init();
}

/* ====================== INIT / SYNC ====================== */
function init(){
  // filtro de dia salvo
  const sd = localStorage.getItem(DAYK); if(sd){ dayFilter=sd; }
  // cache local imediato
  try{
    const c = JSON.parse(localStorage.getItem(CKEY)||'{}');
    _evAll = c.ev||[]; _vendasAll = c.vendas||[]; _capiLogAll = c.capi||[];
  }catch(e){}
  applyFilter(); renderAll();
  bindTabs();
  sync(false);
}

function localBackup(){
  try{ return (JSON.parse(localStorage.getItem(KEY)||'[]')||[]).map(norm); }catch(e){ return []; }
}
function mergeNoDup(base, extra){
  const seen = new Set(base.map(e=>e.s+'|'+e.ev+'|'+e.step+'|'+e.t));
  const out = base.slice();
  extra.forEach(e=>{ const k=e.s+'|'+e.ev+'|'+e.step+'|'+e.t; if(!seen.has(k)){seen.add(k);out.push(e);} });
  return out;
}
function extract(j){ if(Array.isArray(j))return j; if(!j)return[]; return j.data||j.rows||j.eventos||j.vendas||j.items||[]; }

async function sync(manual){
  if(manual) toast('Atualizando…');
  $('#syncTxt').textContent='sincronizando…';
  const ok = GAS && !/COLE_AQUI/.test(GAS);
  if(ok){
    try{
      const [a,b,c] = await Promise.all([
        fetch(GAS).then(r=>r.json()).catch(()=>[]),
        fetch(GAS+'?sheet=vendas').then(r=>r.json()).catch(()=>[]),
        fetch(GAS+'?sheet=capi_log').then(r=>r.json()).catch(()=>[])
      ]);
      _evAll     = mergeNoDup(extract(a).map(norm), localBackup());
      _vendasAll = extract(b).map(normVenda);
      _capiLogAll= extract(c).map(normCapi);
      localStorage.setItem(CKEY, JSON.stringify({ev:_evAll,vendas:_vendasAll,capi:_capiLogAll,ts:Date.now()}));
      $('#syncTxt').textContent='atualizado '+new Date().toLocaleTimeString('pt-BR');
    }catch(e){
      _evAll = mergeNoDup(_evAll, localBackup());
      $('#syncTxt').textContent='offline · usando cache';
    }
  }else{
    _evAll = mergeNoDup(_evAll, localBackup());
    $('#syncTxt').textContent='GAS não configurado';
  }
  applyFilter(); renderAll();
  toast('✓ '+fmt(_evAll.filter(e=>!isTest(e.s)).length)+' eventos · '+fmt(_vendasAll.length)+' vendas · '+fmt(_capiLogAll.length)+' CAPI');
}

/* SVG area chart — visitas (view step 0) ao longo do tempo */
function areaChart(){
  const views = liveEv().filter(e=>e.ev==='view'&&String(e.step)==='0'&&e.t);
  if(views.length<2) return '<div class="empty" style="padding:14px">Sem dados suficientes para o gráfico.</div>';
  const buckets={};
  views.forEach(e=>{ const k=dayKey(e.t); buckets[k]=(buckets[k]||0)+1; });
  const keys=Object.keys(buckets).sort();
  const pts=keys.map(k=>buckets[k]);
  const W=1000,H=160,pad=8;
  const max=Math.max(...pts), dx=(W-pad*2)/Math.max(1,pts.length-1);
  const xy=pts.map((v,i)=>[pad+i*dx, H-pad-(v/max)*(H-pad*2)]);
  const line=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${(pad+(pts.length-1)*dx).toFixed(1)} ${H-pad} L ${pad} ${H-pad} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="160" preserveAspectRatio="none">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--primary)" stop-opacity=".28"/>
      <stop offset="1" stop-color="var(--primary)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round"/>
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:4px">
    <span>${keys[0].split('-').reverse().slice(0,2).join('/')}</span>
    <span>visitas/dia · pico ${max}</span>
    <span>${keys[keys.length-1].split('-').reverse().slice(0,2).join('/')}</span></div>`;
}

/* ---- TAB: RESUMO ---- */
function countBy(arr,keyFn){ const m={}; arr.forEach(x=>{const k=keyFn(x)||'—'; m[k]=(m[k]||0)+1;}); return m; }
function uCountBy(keyFn,pred){ // sessões únicas por chave
  const m={}; const seen={};
  liveEv().forEach(e=>{ if(pred&&!pred(e))return; const k=keyFn(e)||'—'; seen[k]=seen[k]||new Set(); if(e.s){seen[k].add(e.s);} });
  Object.keys(seen).forEach(k=>m[k]=seen[k].size); return m;
}
function barGroup(obj,limit){
  const ent=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,limit||8);
  const max=Math.max(1,...ent.map(e=>e[1]));
  if(!ent.length) return '<div class="empty">Sem dados.</div>';
  return '<div class="barGroup">'+ent.map(([k,v])=>`<div class="bg-row">
    <div class="bg-name" title="${k}">${k}</div>
    <div class="bg-track"><div class="bg-fill" style="width:${v/max*100}%"></div></div>
    <div class="bg-val">${fmt(v)}</div></div>`).join('')+'</div>';
}

      <div style="font-size:12.5px;color:var(--muted)">Progresso no funil: ${pct(m.purchases,m.visitors)}% dos visitantes compraram.</div>

/* ====================== CSV / RESET ====================== */
function exportCSV(){
  const cols=['t','s','ev','step','name','gender','ans','ms','origin','device','browser','os','utm_source','utm_medium','utm_campaign','utm_content','utm_adset','ref'];
  const head=cols.join(',');
  const body=liveEv().map(e=>{
    const o=Object.assign({},e,{origin:evOrigin(e), t:e.t?new Date(e.t).toISOString():''});
    return cols.map(c=>`"${String(o[c]??'').replace(/"/g,'""')}"`).join(',');
  }).join('\n');
  const blob=new Blob([head+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='eventos_'+(dayFilter||'todos')+'.csv'; a.click();
  toast('✓ CSV exportado');
}
async function resetData(){
  if(!confirm('Isso vai APAGAR todos os dados de eventos (no GAS e local). Continuar?')) return;
  if(!confirm('Tem certeza absoluta? Esta ação não pode ser desfeita.')) return;
  try{
    if(GAS && !/COLE_AQUI/.test(GAS)){
      await fetch(GAS,{method:'POST',body:JSON.stringify({action:'reset'})}).catch(()=>{});
    }
  }catch(e){}
  localStorage.removeItem(KEY); localStorage.removeItem(CKEY);
  _evAll=[];_vendasAll=[];_capiLogAll=[]; applyFilter(); renderAll();
  toast('🗑️ Dados resetados');
}

/* ====================== TOAST ====================== */
let toastT;
