<style>
  :root {
    --cream: #fbf6f2;
    --ink: #2a1a2a;
    --pink: #cf3a7d;
    --green-a: #1fa84a;
    --green-b: #2cbf52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--cream); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    line-height: 1.6;
  }
  .serif { font-family: 'Playfair Display', Georgia, serif; }

  /* HEADER */
  .header {
    text-align: center; padding: 18px 16px 16px; background: #fff;
    border-bottom: 1px solid #f3e8ee;
  }
  .header-logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 21px; font-weight: 800; color: var(--pink); letter-spacing: 0.2px;
  }
  .header-logo .heart { margin-right: 7px; }

  /* PANEL */
  .panel {
    max-width: 480px; margin: 26px auto 40px; background: #fff;
    border: 1px solid #f3e8ee; border-radius: 22px;
    box-shadow: 0 8px 30px rgba(120,60,90,0.07);
    padding: 30px 24px 28px; text-align: center;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: #fdeef5; border: 1.5px solid #f6cadd; border-radius: 99px;
    padding: 8px 18px; font-size: 13.5px; color: var(--pink); font-weight: 600;
    margin-bottom: 18px;
  }
  .title {
    font-size: 27px; font-weight: 800; color: var(--ink); line-height: 1.25;
    letter-spacing: -0.3px; margin-bottom: 12px;
  }
  .stars { color: #f5b32a; font-size: 21px; letter-spacing: 3px; margin-bottom: 24px; }

  /* VIDEO */
  .video-embed {
    position: relative; width: 100%; padding-top: 133.333%; /* 1440/1080 = 3:4 */
    border-radius: 18px; overflow: hidden; margin-bottom: 22px;
    box-shadow: 0 10px 30px rgba(120,60,90,0.16); background: #11070d;
  }
  .video-embed iframe {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
  }

  /* CTA */
  .cta-ring { border: 1.6px solid #b9e6c4; border-radius: 22px; padding: 7px; margin: 26px 0 14px; }
  .btn-cta {
    display: block; width: 100%; background: linear-gradient(180deg, var(--green-b), var(--green-a));
    color: #fff; font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 700;
    padding: 21px 18px; border-radius: 15px; border: none; cursor: pointer;
    letter-spacing: 0.4px; box-shadow: 0 6px 18px rgba(31,168,74,0.32);
    transition: transform 0.12s, filter 0.12s;
  }
  .btn-cta:hover { filter: brightness(1.04); }
  .btn-cta:active { transform: scale(0.985); }
  .cta-pulse { animation: ctaPing 1.7s cubic-bezier(.4,0,.2,1) infinite; }
  @keyframes ctaPing {
    0%   { transform: scale(1);    box-shadow: 0 6px 18px rgba(31,168,74,0.32), 0 0 0 0 rgba(44,191,82,0.5); }
    70%  { transform: scale(1.025);box-shadow: 0 9px 24px rgba(31,168,74,0.40), 0 0 0 16px rgba(44,191,82,0); }
    100% { transform: scale(1);    box-shadow: 0 6px 18px rgba(31,168,74,0.32), 0 0 0 0 rgba(44,191,82,0); }
  }
  @media (prefers-reduced-motion: reduce) { .cta-pulse { animation: none; } }

  .footer { font-size: 12.5px; color: #a99fa6; margin-top: 6px; }

  @media (max-width: 520px) {
    .panel { margin: 18px 14px 32px; padding: 26px 18px 24px; border-radius: 20px; }
    .title { font-size: 23px; }
  }
</style>
